            const btnExit = document.getElementById("btn-exit");

            if (myRole === 'offline') {
                congrats.innerHTML = `Gyakorlás Vége!<br><br><span style="color:var(--correct-green); font-size:clamp(1.8rem, 6vw, 2.6rem); font-weight:900;">+ ${d.p1.score.toLocaleString()} Ft</span>`;
                btnRematch.style.display = "inline-block"; btnExit.style.display = "inline-block";
                return;
            }

            const myName = d[myRole].name;
            const myScore = d[myRole].score;
            const otherRole = myRole === 'p1' ? 'p2' : 'p1';
            const otherScore = d[otherRole].score;

            const isWinner = myScore > otherScore;
            const isLoser = myScore < otherScore;
            
            const ref = db.collection("leaderboards").doc(getToday()).collection("scores").doc(myName.toLowerCase());
            
            let appliedMult = 1;
            let finalStreak = 0;
            let addedScore = 0;

            try {
                await db.runTransaction(async (t) => {
                    const doc = await t.get(ref);
                    let currentStreak = doc.exists ? (doc.data().streak || 0) : 0;
                    let currentTotal = doc.exists ? (doc.data().score || 0) : 0;
                    
                    if (isWinner || d.exitNote) {
                        finalStreak = currentStreak + 1;
                        appliedMult = finalStreak >= 3 ? 1.5 : (finalStreak === 2 ? 1.2 : 1.0);
                        addedScore = Math.floor(myScore * appliedMult);
                    } else if (isLoser) {
                        finalStreak = 0;
                        appliedMult = 1.0;
                        addedScore = 0; // Vesztes 0 Ft-ot kap a toplistára!
                    } else { // Döntetlen
                        finalStreak = currentStreak;
                        appliedMult = 1.0;
                        addedScore = myScore; // Döntetlennél amit gyűjtött megkapja
                    }
                    
                    t.set(ref, { 
                        name: myName, 
                        score: currentTotal + addedScore,
                        streak: finalStreak,
                        lastUpdate: firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true });
                });

                // UI Frissítése
                let streakText = finalStreak > 1 ? `<br><br><span style="color:#f39c12; font-weight:900; font-size:1.1rem;">🔥 Győzelmi széria: ${finalStreak}x (Szorzó: ${appliedMult}x)</span>` : "";

                if(d.exitNote) {
                    congrats.innerHTML = `Ellenfeled kilépett!<br><br><span style="color:var(--correct-green); font-size:clamp(1.8rem, 6vw, 2.6rem); font-weight:900;">+ ${addedScore.toLocaleString()} Ft</span>${streakText}`;
                } else if(isWinner) {
                    congrats.innerHTML = `Gratulálok, <span style="color:var(--accent-gold); font-size:clamp(1.2rem, 5vw, 1.8rem); text-transform:uppercase;">${myName}</span> nyert!<br><br><span style="color:var(--correct-green); font-size:clamp(1.8rem, 6vw, 2.6rem); font-weight:900;">+ ${addedScore.toLocaleString()} Ft</span>${streakText}`;
                } else if (isLoser) {
                    // Drámai vesztes képernyő és 0 Ft
                    congrats.innerHTML = `Sajnos ez most nem jött össze... 😢<br><br>A nyertes <span style="color:var(--accent-gold); text-transform:uppercase;">${d[otherRole].name}</span> lett.<br><br>A játék neve "Mindent vagy Semmit", így az elvitt nyereményed:<br><span style="color:var(--wrong-red); font-size:clamp(1.8rem, 6vw, 2.6rem); font-weight:900;">0 Ft</span><br><span style="font-size:0.9rem; color:#aaa; display:block; margin-top:10px;">A győzelmi szériád megszakadt. Próbáld újra!</span>`;
                } else {
                    congrats.innerHTML = `Döntetlen!<br><br><span style="color:var(--correct-green); font-size:clamp(1.5rem, 5vw, 2rem); font-weight:900;">+ ${addedScore.toLocaleString()} Ft</span>${streakText}`;
                }

                btnRematch.style.display = "inline-block"; 
                btnExit.style.display = "inline-block";
                loadLeaderboard();

            } catch (error) {
                console.error("Hiba a végső pontok mentésekor:", error);
                congrats.innerHTML = "Hiba történt az eredmények mentésekor.";
                btnExit.style.display = "inline-block";
            }
        }

        async function handleSelect(val) {
            if(roomData.phase !== 'answering' || (roomData.activePlayer !== myRole && myRole !== 'offline')) return;
            clearTimers();
            playSound('select');

            updateRoom({ phase: 'strobe', selectedOption: val });
            setTimeout(() => {
                const q = roomData.speedQMode ? roomData.currentQ : roomData.board[roomData.currentQ.col].questions[roomData.currentQ.row];
                const bonus = roomData.speedQMode ? 0 : (roomData.bonuses[`${roomData.currentQ.col}-${roomData.currentQ.row}`] || 0);
                
                const isFast = (roomData.buzzTime && roomData.buzzTime <= 2.0 && !roomData.speedQMode);
                const speedBonus = isFast ? 1000 : 0;

                const correct = (val === q.correct);
                const role = roomData.activePlayer;
                const other = role === 'p1' ? 'p2' : 'p1';
                
                if(correct) playSound('correct'); else playSound('wrong');

                let ns = roomData[role].score + (correct ? (q.points + bonus + speedBonus) : -q.points);
                if(ns < 0) ns = 0;

                if(correct) {
                    const nr =[...roomData.unlockedRows]; if(!roomData.speedQMode) nr[roomData.currentQ.col]++;
                    updateRoom({[`${role}.score`]: ns, unlockedRows: nr, phase: 'result', turn: role });
                } else {
                    if(roomData.stealMode || myRole === 'offline' || roomData.speedQMode) {
                        const nr =[...roomData.unlockedRows]; if(!roomData.speedQMode) nr[roomData.currentQ.col]++;
                        updateRoom({[`${role}.score`]: ns, unlockedRows: nr, phase: 'result', turn: (roomData.speedQMode ? 'p1' : other) });
                    } else {
                        updateRoom({[`${role}.score`]: ns, stealMode: true, phase: 'idle', activePlayer: null, wrongAnswers: [val], lastWrongPlayer: role, buzzTime: null });
                        localIdleStartTime = Date.now(); 
                    }
                }
            }, 1000);
        }

        // --- BUZZER LOGIKA + REAKCIÓIDŐ MÉRÉS ---
        async function handleBuzzerPress(e) {
            if (e && e.target && e.target.closest('#btn-mute')) return; 
            if (!roomData || isBuzzing) return;
            
            if ((roomData.gameState === 'speed_q' || roomData.gameState === 'question') && roomData.phase === 'idle' && !roomData.activePlayer) {
                if (roomData.stealMode && roomData.lastWrongPlayer === myRole) return; 
                
                let rTime = (Date.now() - localIdleStartTime) / 1000;
                if (rTime < 0) rTime = 0.01;

                if (myRole === 'offline') {
                    updateRoom({ activePlayer: 'p1', phase: 'answering', wildBlink: true, buzzTime: rTime });
                    setTimeout(() => updateRoom({ wildBlink: false }), 1000);
                    return;
                }

                isBuzzing = true;
                const docRef = db.collection("rooms").doc(myRoomId);
                
                db.runTransaction(async (t) => {
                    const doc = await t.get(docRef);
                    if (!doc.exists) return;
                    const d = doc.data();
                    if (d.phase === 'idle' && !d.activePlayer) {
                        if (d.stealMode && d.lastWrongPlayer === myRole) return;
                        t.update(docRef, { activePlayer: myRole, phase: 'answering', wildBlink: true, buzzTime: rTime });
                    }
                }).then(() => {
                    isBuzzing = false;
                    setTimeout(() => updateRoom({ wildBlink: false }), 1000);
                }).catch(err => {
                    isBuzzing = false;
                    console.error("Buzzer hiba:", err);
                });
            }
        }

        document.addEventListener('click', (e) => { handleBuzzerPress(e); });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.code === 'Space') {
                handleBuzzerPress(e);
            }
        });

        function updateRoom(obj) { if(myRole === 'offline') { roomData = {...roomData, ...obj}; render(); } else db.collection("rooms").doc(myRoomId).update(obj); }
        
        function initBoard() {
            const b = document.getElementById("game-board"); b.innerHTML = "";
            roomData.board.forEach((cat, cIdx) => {
                const col = document.createElement("div"); col.className = "category-col";
                col.innerHTML = `<div class="category-header-scene" id="h-${cIdx}" onclick="flipCat(${cIdx})"><div class="category-header-flipper"><div class="header-face header-front">?</div><div class="header-face header-back">${cat.category}</div></div></div>`;
                for(let rIdx=0; rIdx<5; rIdx++) {
                    const card = document.createElement("div"); card.id = `c-${cIdx}-${rIdx}`;
                    card.innerText = (rIdx+1)*1000; 
                    card.onclick = () => {
                        if(roomData.gameState==='board' && (roomData.turn === myRole || myRole === 'offline') && roomData.board[cIdx].flipped && rIdx===roomData.unlockedRows[cIdx]) {
                            playSound('select');
                            updateRoom({gameState:'question', currentQ:{col:cIdx, row:rIdx}, phase:'idle', activePlayer:null, buzzTime:null});
                        }
                    };
                    col.appendChild(card);
                }
                b.appendChild(col);
            });
        }

        function updateBoard() {
            roomData.board.forEach((cat, cIdx) => {
                if (cat.flipped) document.getElementById(`h-${cIdx}`).classList.add("flipped");
                for(let rIdx=0; rIdx<5; rIdx++) {
                    const card = document.getElementById(`c-${cIdx}-${rIdx}`);
                    if(!card) continue;
                    if (rIdx < roomData.unlockedRows[cIdx]) card.className = "card played";
                    else {
                        card.className = "card";
                        if(roomData.bonuses[`${cIdx}-${rIdx}`]) card.style.boxShadow = "0 0 15px var(--accent-gold)";
                    }
                }
            });
        }

        function flipCat(idx) { 
            if (roomData.gameState === 'board' && (roomData.turn === myRole || myRole === 'offline') && !roomData.board[idx].flipped) { 
                playSound('flip');
                const nb =[...roomData.board]; nb[idx].flipped = true; updateRoom({ board: nb }); 
            } 
        }

        document.getElementById("btn-rematch").onclick = () => { playSound('select'); updateRoom({[`rematch.${myRole}`]: true }); };

        async function loadLeaderboard() {
            const listEl = document.getElementById("leaderboard-list");
            const snap = await db.collection("leaderboards").doc(getToday()).collection("scores").orderBy("score", "desc").limit(20).get();
            const ySnap = await db.collection("leaderboards").doc(getYesterday()).collection("scores").orderBy("score", "desc").limit(1).get();
            let yWin = ySnap.empty ? null : ySnap.docs[0].data().name;
            listEl.innerHTML = (snap.empty) ? "<p style='color:#ccc; font-size:1rem; margin-top: 10px; font-weight:700;'>Még nincs mai toplista adat. Légy te az első!</p>" : "";
            let i = 1;
            snap.forEach(doc => {
                const d = doc.data();
                const medal = i === 1 ? "🥇" : i === 2 ? "🥈" : i === 3 ? "🥉" : i + ".";
                const streakHtml = d.streak && d.streak > 1 ? `<span class="streak-badge">🔥 ${d.streak}</span>` : "";
                
                listEl.innerHTML += `<div class="leaderboard-item ${i<=3?`rank-${i}`:''}"><div class="rank-icon">${medal}</div><div class="leaderboard-name">${d.name} ${d.name === yWin ? "🏆" : ""} ${streakHtml}</div><div class="leaderboard-score">${d.score.toLocaleString()} Ft</div></div>`;
                i++;
            });
        }
        loadLeaderboard();
    </script>
</body>
