<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mindent vagy Semmit! - TV Show Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Playfair+Display:wght@700&display=swap');
        
        :root {
            --studio-bg: #030514;
            --studio-glow: #0a113a;
            --board-border: #1a2a6c;
            --card-bg: linear-gradient(180deg, #02115e, #010833);
            --text-color: #ffffff;
            --accent-gold: #ffcc00;
            --p1-color: #00d2ff;
            --p2-color: #ff0055;
            --correct-green: #2ecc71;
            --wrong-red: #e74c3c;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body {
            background-color: var(--studio-bg);
            background-image: 
                radial-gradient(circle at 50% 0%, var(--studio-glow) 0%, transparent 80%),
                url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 20.5V18H0v-2h20v-2.5L22.5 16 25 13.5V0h2v13.5L29.5 16 32 18.5V20h8v2h-8v1.5L29.5 26 27 28.5V40h-2V28.5L22.5 26 20 23.5V20.5zM0 20h2v-2H0v2z' fill='%23ffffff' fill-opacity='0.03' fill-rule='evenodd'/%3E%3C/svg%3E");
            color: var(--text-color);
            font-family: 'Montserrat', sans-serif;
            height: 100vh; height: 100dvh;
            width: 100vw;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* --- STÚDIÓ FÉNYEK --- */
        .spotlights { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; z-index: -1; pointer-events: none; }
        .spotlight { position: absolute; top: -10vh; width: 30vw; height: 120vh; background: linear-gradient(180deg, rgba(255,255,255,0.06) 0%, transparent 100%); transform-origin: top center; filter: blur(25px); }
        .spot-1 { left: -5vw; transform: rotate(-25deg); }
        .spot-2 { right: -5vw; transform: rotate(25deg); }

        /* --- SCOREBOARD --- */
        header { 
            width: 100%; 
            background: rgba(0,0,0,0.95); 
            border-bottom: 3px solid var(--board-border); 
            padding: 8px 15px; 
            z-index: 5000;
            flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .scoreboard { display: flex; gap: 10px; max-width: 1200px; margin: 0 auto; }
        .player-score { 
            flex: 1; border: 3px solid; border-radius: 12px; padding: 6px; 
            text-align: center; background: #050a1f; transition: 0.2s;
        }
        #p1-score-box { border-color: var(--p1-color); }
        #p2-score-box { border-color: var(--p2-color); }
        .score-val { font-size: 1.1rem; font-weight: 900; color: var(--accent-gold); display: block; }
        .p-name { font-size: 0.7rem; font-weight: 900; text-transform: uppercase; color: #fff; }

        @keyframes flash-p1 { 0%, 100% { background: #050a1f; } 50% { background: var(--p1-color); color: #000; } }
        @keyframes flash-p2 { 0%, 100% { background: #050a1f; } 50% { background: var(--p2-color); color: #fff; } }
        .p1-active-wild { animation: flash-p1 0.15s infinite; border-color: #fff !important; box-shadow: 0 0 20px var(--p1-color); }
        .p2-active-wild { animation: flash-p2 0.15s infinite; border-color: #fff !important; box-shadow: 0 0 20px var(--p2-color); }
        .has-turn { border-color: var(--accent-gold) !important; box-shadow: 0 0 15px rgba(255, 204, 0, 0.6); }

        /* --- SCREENS --- */
        main { flex: 1; position: relative; width: 100%; display: flex; flex-direction: column; overflow: hidden; }
        
        .screen { 
            display: none; width: 100%; height: 100%; 
            overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; 
        }
        .screen.active { display: block; }
        
        .screen-content {
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            min-height: 100%; padding: 20px 15px; width: 100%; max-width: 1400px; margin: 0 auto;
        }
        #game-screen .screen-content { justify-content: center; padding: 10px; }
        #waiting-screen .screen-content { justify-content: center; text-align: center; }

        /* LOBBY */
        .logo-wrapper { margin-top: 10px; margin-bottom: 25px; text-align: center; flex-shrink: 0; }
        .icon-row { font-size: 1.8rem; margin-bottom: 10px; display: flex; gap: 10px; justify-content: center; }
        .lobby-logo { font-size: 2.2rem; font-weight: 900; text-transform: uppercase; line-height: 1; text-shadow: 0 0 15px rgba(255,204,0,0.4); }
        
        .lobby-content-wrapper { display: flex; flex-direction: column; width: 100%; max-width: 450px; gap: 20px; align-items: center; }
        .lobby-container { background: rgba(0,0,0,0.8); border: 2px solid var(--board-border); border-radius: 20px; padding: 25px; width: 100%; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        .input-group input { width: 100%; padding: 14px; border-radius: 10px; border: 2px solid var(--board-border); background: #020826; color: #fff; text-align: center; font-size: 1.1rem; font-weight: 900; margin-bottom: 10px; transition: 0.2s; }
        .input-group input:focus { outline: none; border-color: var(--accent-gold); box-shadow: 0 0 10px rgba(255,204,0,0.5); }
        
        .btn-main { background: linear-gradient(180deg, #2ecc71, #27ae60); color: #000; font-size: 1rem; font-weight: 900; padding: 14px; width: 100%; border: none; border-radius: 12px; cursor: pointer; text-transform: uppercase; margin-top: 8px; box-shadow: 0 4px 0 #145a32; transition: transform 0.1s; }
        .btn-main:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }

        /* TOPLISTA */
        .leaderboard-box { background: rgba(0,0,0,0.75); border: 2px solid var(--accent-gold); border-radius: 15px; width: 100%; padding: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        .leaderboard-title { text-align: center; color: var(--accent-gold); font-size: 1.2rem; font-weight: 900; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; }
        .leaderboard-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 15px; margin-bottom: 8px; background: rgba(255,255,255,0.08); border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: 0.2s; }
        .leaderboard-item:hover { transform: scale(1.02); background: rgba(255,255,255,0.12); }
        .rank-icon { font-size: 1.3rem; font-weight: 900; width: 35px; text-align: left; }
        .leaderboard-name { flex-grow: 1; text-align: left; font-size: 1.1rem; font-weight: 900; margin-left: 5px; color: #fff; letter-spacing: 0.5px; display: flex; align-items: center; gap: 8px;}
        .streak-badge { background: #e74c3c; color: #fff; font-size: 0.75rem; padding: 2px 6px; border-radius: 8px; font-weight: 900; box-shadow: 0 0 8px #e74c3c; }
        .leaderboard-score { font-size: 1.1rem; font-weight: 900; color: var(--accent-gold); white-space: nowrap; }
        
        .rank-1 { border-left: 5px solid #ffd700; background: linear-gradient(90deg, rgba(255,215,0,0.15), rgba(255,255,255,0.05)); }
        .rank-2 { border-left: 5px solid #c0c0c0; background: linear-gradient(90deg, rgba(192,192,192,0.15), rgba(255,255,255,0.05)); }
        .rank-3 { border-left: 5px solid #cd7f32; background: linear-gradient(90deg, rgba(205,127,50,0.15), rgba(255,255,255,0.05)); }

        /* TÁBLA ÉS KATEGÓRIA 3D FORGATÁS */
        .board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 100%; max-width: 800px; flex: 1; align-content: center; }
        .category-col { display: flex; flex-direction: column; gap: 8px; }
        .category-header-scene { height: 10vh; min-height: 55px; perspective: 600px; cursor: pointer; }
        
        .category-header-flipper { position: relative; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); transform-style: preserve-3d; }
        .flipped .category-header-flipper { transform: rotateX(180deg); }

        .header-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 6px; border: 2px solid var(--accent-gold); display: flex; align-items: center; justify-content: center; text-align: center; font-weight: 900; text-transform: uppercase; padding: 2px; }
        .header-front { background: #000; color: var(--accent-gold); font-size: 1.4rem; }
        .header-back { background: var(--accent-gold); color: #000; transform: rotateX(180deg); font-size: 0.65rem; line-height: 1.1; word-wrap: break-word; }
        
        .card { background: var(--card-bg); color: var(--accent-gold); font-size: 1.1rem; font-weight: 900; border-radius: 6px; border: 2px solid #0044ff; height: 9vh; min-height: 50px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 10px rgba(0,210,255,0.3); transition: 0.2s; cursor: pointer; }
        .card:active { transform: scale(0.95); }
        .card.played { background: #1a1a1a !important; color: #444 !important; border-color: #333 !important; box-shadow: none !important; opacity: 0.5; cursor: default; }

        /* MODAL FIX POZÍCIÓ */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.98); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 6000; padding: 20px; }
        .question-box { width: 100%; max-width: 600px; text-align: center; }
        #question-text { font-size: clamp(1.1rem, 5vw, 2rem); font-weight: 900; margin-bottom: 25px; line-height: 1.4; }
        .option-btn { background: #0a113a; color: #fff; border: 2px solid #1a2a6c; padding: 15px; font-size: 1rem; font-weight: 900; border-radius: 10px; width: 100%; margin-bottom: 10px; transition: 0.1s; cursor: pointer; position: relative; z-index: 6005; }
        .option-btn:active { transform: scale(0.98); }
        
        .timer-container { width: 100%; height: 8px; background: #111; border-radius: 4px; margin-bottom: 15px; overflow: hidden; }
        .timer-bar { height: 100%; width: 100%; background: var(--correct-green); transform-origin: left; }

        .btn-strobe { animation: strobe-gold 0.15s infinite !important; }
        .btn-correct-blink { animation: blink-correct 0.4s infinite !important; }
        .btn-wrong { background: var(--wrong-red) !important; color: #fff !important; border-color: #c0392b !important; }
        .btn-correct-final { background: var(--correct-green) !important; color: #000 !important; border-color: #27ae60 !important; }
        
        @keyframes strobe-gold { 0%, 100% { background: var(--accent-gold); color: #000; } 50% { background: #fff; color: #000; } }
        @keyframes blink-correct { 0%, 100% { background: var(--correct-green); color: #000; } 50% { background: transparent; color: #fff; } }

        /* BUZZER JELZÉS ÉS IDŐZÍTŐ */
        #buzzer-hint {
            color: #00d2ff;
            font-size: clamp(1.1rem, 4vw, 1.4rem);
            font-weight: 900;
            margin-bottom: 25px;
            animation: pulse-hint 0.6s infinite alternate;
            text-transform: uppercase;
            cursor: pointer;
        }
        @keyframes pulse-hint {
            from { opacity: 1; transform: scale(1); text-shadow: 0 0 10px rgba(0, 210, 255, 0.5); }
            to { opacity: 0.6; transform: scale(0.98); text-shadow: 0 0 5px transparent; }
        }
        
        .reaction-info { font-size: 0.9rem; color: #aaa; margin-top: 5px; font-weight: 700; text-transform: none; }
        .speed-bonus-text { color: #f39c12; font-size: 1rem; font-weight: 900; margin-top: 5px; display: block; animation: strobe-gold 1s infinite alternate; text-shadow: 0 0 10px rgba(243, 156, 18, 0.6); }

        .lexikon-box { margin-top: 20px; background: rgba(255,255,255,0.08); border-left: 4px solid var(--accent-gold); padding: 15px; border-radius: 8px; text-align: left; display: none; }
        .lexikon-text { font-size: 1rem; font-family: 'Playfair Display', serif; font-style: italic; line-height: 1.5; color: #eee; }

        /* MUTE GOMB */
        .btn-mute {
            position: fixed; bottom: 20px; right: 20px; z-index: 9999;
            width: 55px; height: 55px; border-radius: 50%;
            background: rgba(0,0,0,0.7); border: 2px solid var(--accent-gold);
            color: #fff; font-size: 1.5rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 15px rgba(0,0,0,0.5); backdrop-filter: blur(5px);
            transition: 0.2s;
        }
        .btn-mute:active { transform: scale(0.9); }

        .hidden { display: none !important; }
        @keyframes shrinkTimer { from { transform: scaleX(1); } to { transform: scaleX(0); } }

        /* --- DESKTOP ASZTALI NÉZET --- */
        @media (min-width: 1024px) {
            .lobby-content-wrapper { flex-direction: row; max-width: 1100px; align-items: flex-start; gap: 40px; padding-top: 2vh; }
            .lobby-container { width: 45%; flex-shrink: 0; }
            .leaderboard-box { width: 55%; flex-shrink: 0; max-height: none; }
            
            header { padding: 15px 30px; }
            .scoreboard { max-width: 1200px; gap: 40px; }
            .score-val { font-size: 1.8rem; }
            .p-name { font-size: 1rem; }
            
            .board { max-width: 1200px; gap: 15px; }
            .card { height: 12vh; min-height: 80px; font-size: 2rem; border-width: 3px; }
            .header-front { font-size: 2.2rem; border-width: 3px; }
            .header-back { font-size: 1.1rem; border-width: 3px; }
            
            .question-box { max-width: 800px; }
            .option-btn { font-size: 1.4rem; padding: 22px; margin-bottom: 15px; border-width: 3px; }
            .lexikon-text { font-size: 1.2rem; }
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <div class="spotlights">
        <div class="spotlight spot-1"></div>
        <div class="spotlight spot-2"></div>
    </div>

    <header id="main-header" class="hidden">
        <div class="scoreboard">
            <div id="p1-score-box" class="player-score">
                <span id="p1-name-display" class="p-name">P1</span>
                <span class="score-val" id="p1-score">0 Ft</span>
            </div>
            <div id="p2-score-box" class="player-score">
                <span id="p2-name-display" class="p-name">P2</span>
                <span class="score-val" id="p2-score">0 Ft</span>
            </div>
        </div>
    </header>

    <main>
        <!-- LOBBY -->
        <div id="lobby-screen" class="screen active">
            <div class="screen-content">
                <div class="logo-wrapper">
                    <div class="icon-row"><span>📚</span><span>🔬</span><span>🧪</span><span>🏛️</span><span>🎻</span><span>📖</span><span>🔭</span><span>🌍</span></div>
                    <div class="lobby-logo">Mindent <span style="color:var(--accent-gold); font-family:'Playfair Display'; font-style:italic; text-transform:lowercase;">vagy</span> Semmit!</div>
                </div>
                <div class="lobby-content-wrapper">
                    <div class="lobby-container">
                        <div class="input-group"><input type="text" id="player-name" placeholder="Írd be a neved..." maxlength="12"></div>
                        <button class="btn-main" id="btn-create-room">Multi Párbaj</button>
                        <button class="btn-main" id="btn-offline" style="background: linear-gradient(180deg, #9b59b6, #8e44ad); color:#fff;">Egyéni Gyakorlás</button>
                        <div style="margin: 25px 0 5px 0; font-size: 0.75rem; font-weight: 900; color: #aaa;">CSATLAKOZÁS</div>
                        <div class="input-group"><input type="number" id="room-code-input" placeholder="Szobakód"></div>
                        <button class="btn-main" id="btn-join-room" style="background: linear-gradient(180deg, #3498db, #2980b9); color:#fff;">Belépés</button>
                    </div>
                    <div class="leaderboard-box">
                        <div class="leaderboard-title">🏆 Napi Toplista</div>
                        <div id="leaderboard-list"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- WAITING -->
        <div id="waiting-screen" class="screen">
            <div class="screen-content">
                <h2 style="color:var(--accent-gold)">SZOBASZÁM:</h2>
                <div id="display-room-code" style="font-size: 5rem; font-weight: 900; color: #fff; margin: 15px 0; letter-spacing: 5px;">----</div>
                <p style="font-weight:700;">Várjuk az ellenfelet...</p>
                <p style="font-size:0.8rem; color:#888; margin-top:10px;">Oszd meg a fenti kódot a barátoddal!</p>
                <button class="btn-main" style="background:#444; width:auto; padding:10px 40px; margin-top:30px; box-shadow:none;" onclick="location.reload()">Mégse</button>
            </div>
        </div>

        <!-- GAME BOARD -->
        <div id="game-screen" class="screen">
            <div class="screen-content">
                <div id="turn-indicator" style="padding:10px; color:var(--accent-gold); font-size:1rem; font-weight:900; text-transform:uppercase;"></div>
                <div class="board" id="game-board"></div>
            </div>
        </div>

        <!-- MODAL / KÉRDÉS -->
        <div class="modal-overlay" id="modal">
            <div class="question-box">
                <div id="status-message" style="color:var(--accent-gold); font-weight:900; margin-bottom:10px; text-transform:uppercase; font-size:1.1rem; letter-spacing:1px;">...</div>
                <div id="buzzer-hint" class="hidden">KATTINTS BÁRHOVA VAGY ÜSS ENTERT!</div>
                <div class="timer-container"><div class="timer-bar" id="timer-bar"></div></div>
                <div id="question-text">...</div>
                <div id="options-section" class="options-container"></div>
                <div id="lexikon-magyarazat" class="lexikon-box"><div id="lexikon-text" class="lexikon-text"></div></div>
            </div>
        </div>

        <!-- END MODAL / GYŐZTES KÉPERNYŐ OVERLAY -->
        <div class="modal-overlay" id="end-modal" style="z-index: 7000;">
            <div style="background:rgba(0,0,0,0.95); border:4px solid var(--accent-gold); border-radius:20px; padding:clamp(20px, 5vw, 35px) clamp(15px, 4vw, 25px); text-align:center; width:90%; max-width:500px; box-shadow: 0 0 35px rgba(255,204,0,0.3);">
                <div style="font-size:clamp(3rem, 10vw, 4rem); margin-bottom:10px;">🎉</div>
                <h1 style="color:var(--accent-gold); font-family:'Playfair Display'; font-size: clamp(2rem, 8vw, 2.8rem); text-transform:uppercase; line-height: 1.1;">Játék Vége</h1>
                <h2 id="end-congrats" style="font-size:clamp(1rem, 4vw, 1.2rem); color:#fff; margin:20px 0; line-height:1.6; font-weight:700;">Kis türelmet... eredmények feldolgozása...</h2>
                <button class="btn-main" id="btn-rematch" style="font-size: 1.2rem; display:none;">Visszavágó</button>
                <button class="btn-main" style="background: linear-gradient(180deg, #7f8c8d, #636e72); box-shadow: none; font-size: 1.2rem; display:none;" id="btn-exit">Vissza a Lobby-ba</button>
                <div id="rematch-status" style="font-size:0.9rem; color:var(--accent-gold); margin-top:20px; font-weight:900;"></div>
            </div>
        </div>
    </main>

    <!-- MUTE GOMB -->
    <button id="btn-mute" title="Hang némítása/bekapcsolása">🔊</button>

    <script>
        // --- AUDIO ENGINE ---
        let audioCtx = null;
        let isMuted = false;

        document.getElementById('btn-mute').onclick = (e) => {
            isMuted = !isMuted;
            e.currentTarget.innerText = isMuted ? '🔇' : '🔊';
        };

        function initAudio() {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if(audioCtx.state === 'suspended') audioCtx.resume();
        }
        
        document.body.addEventListener('click', initAudio, {once:true});
        document.body.addEventListener('touchstart', initAudio, {once:true});

        function playSound(type) {
            if(isMuted) return;
            if(!audioCtx) return;
            if(audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if(type === 'buzzer') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.3);
                gain.gain.setValueAtTime(0.5, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            } else if(type === 'flip') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.linearRampToValueAtTime(800, now + 0.15);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.15);
                osc.start(now);
                osc.stop(now + 0.15);
            } else if(type === 'select') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(600, now);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if(type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, now);
                osc.frequency.setValueAtTime(659.25, now + 0.1);
                osc.frequency.setValueAtTime(783.99, now + 0.2);
                osc.frequency.setValueAtTime(1046.50, now + 0.3);
                gain.gain.setValueAtTime(0.4, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.5);
                osc.start(now);
                osc.stop(now + 0.5);
            } else if(type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.linearRampToValueAtTime(90, now + 0.5);
                gain.gain.setValueAtTime(0.4, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.5);
                osc.start(now);
                osc.stop(now + 0.5);

    { c: "Hihetetlen Felfedezések", q: {

    { c: "Retro Mondókák", q: {

    { c: "Hagyományos Mesterségek", q: {

    { c: "Képregények Aranykora", q: {

        5000: [["Milyen autós játékkal játszottak a gyerekek a hátsó ülésen, ahol az nyert, akinek a kártyáján nagyobb volt a végsebesség vagy a lóerő?", "Autós kártya (Autóskvartett)", "Fekete Péter", "Magyar kártya", "A 'Mindent vivő' adu kártya megszerzése volt a cél, és a fiúk ebből tanulták meg a luxusautók minden technikai adatát."]]
    }},
    { c: "Iskolatáska Kincsei", q: {
        1000: [["Hogy hívták azt a vastag, sokszor két vagy három szintes tolltartót, amiben minden ceruzának külön guminyílása volt?", "Emeletes tolltartó", "Dobozos tolltartó", "Neszeszer", "A mágneses záras vagy cipzáros, katonás rendben tartott ceruzák a kisiskolások legnagyobb büszkeségei voltak."]],
        2000:[["Milyen különleges színösszeállítású, vastag ceruzával javították a tanárok a füzeteket (egyik fele piros, a másik kék volt)?", "Postairón", "Kréta", "Grafitceruza", "A hagyományosan postások által is használt, fában foglalat kétszínű ceruza az iskolai ellenőrzések szimbóluma volt."]],
        3000: [["Mit gyűjtöttek (sokszor eperfagyit vagy gyümölcsöket formázva) a kislányok a tolltartójukban, aminek átható illata volt?", "Szagos radírt", "Színes gyurmát", "Bélyegeket", "Ezek a radírok annyira szépek és illatosak voltak, hogy senki sem használta őket igazi radírozásra, nehogy elkopjanak."]],
        4000: [["Milyen táskát hordtak a diákok a hátizsákjuk mellett, amiben a váltócipő és a fehér trikó lapult?", "Tornazsákot", "Uzsonnás táskát", "Szatyrot", "A vékony, madzaggal összehúzható, sokszor neonzöld vagy mintás tornazsákot kötelező volt bevinni a testnevelés órákra."]],
        5000: [["Miből készült az a hajlékony, sokszor zöld vagy kék vonalzó, amit a padra csapkodva és hajlítgatva szórakoztak az órákon?", "Hajlékony műanyagból (Flopi vonalzó)", "Fából", "Fémből", "Az összetörhetetlen 'flopi' vonalzó csattogtatása az asztal szélén minden tanár idegeit próbára tette a 90-es években."]]
    }},
    { c: "Szilveszteri Szokások Régen", q: {
        1000: [["Milyen papírból készült, rojtos végű zajkeltő eszközzel fújták a fiatalok az utcán a hangos tülkölést szilveszter éjjel?", "Papírtrombita", "Szájharmonika", "Fuvola", "A színes papírtrombiták és a nyelvöltögetős sípok nélkülözhetetlenek voltak az utcabálokon és az otthoni bulikon."]],
        2000: [["Melyik egyszerű, főtt húsételt és szószt esszük a leggyakrabban éjfél után, a himnusz és a koccintás befejeztével?", "Virslit (mustárral)", "Halászlevet", "Rántott húst", "A roppanós frankfurti vagy bécsi virsli ropogós kenyérrel a leggyorsabb és leghagyományosabb szilveszteri vacsora."]],
        3000: [["Milyen apró, érme formájú zöldségből készítünk főzeléket Újév napján, hogy a hagyomány szerint sok pénzünk legyen az évben?", "Lencse (Lencsefőzelék)", "Borsó", "Sárgarépa", "A néphit szerint az apró, pénzérmére emlékeztető lencseszemek fogyasztása gazdagságot és szerencsét hoz a házhoz."]],
        4000: [["Milyen fémet olvasztottak meg egy kanálban a tűz felett, majd öntötték hideg vízbe, hogy a formájából megjósolják a jövőt?", "Ólmot (Ólomöntés)", "Aranyat", "Ezüstüt", "Az ólomöntés (vagy viaszöntés) a megszilárdult, furcsa alakzatokból próbálta kitalálni, hogy férjhez megy-e a lány a jövő évben."]],
        5000: [["Mit lőttek ki a bulizó emberek papírcsövekből vagy szórtak a kezükből az éjféli visszaszámlálás után a szobában?", "Konfettit (Szerpentint)", "Rizst", "Pénzérméket", "A színes papírkorongok (konfetti) és a hosszú papírszalagok (szerpentin) másnapra beborították az egész lakást."]]
    }},
    { c: "A Legendás Aranycsapat", q: {
        1000: [["Hogy hívták a magyar labdarúgó-válogatott csapatkapitányát, a 'Száguldó Őrnagyot', aki a 10-es mezben lőtte a gólokat?", "Puskás Ferenc", "Kocsis Sándor", "Czibor Zoltán", "Puskás Öcsi a magyar foci legnagyobb legendája, aki később a Real Madrid sztárja is lett."]],
        2000: [["Kiket vert meg a magyar válogatott az 'Évszázad mérkőzésén' 6:3-ra a Wembley stadionban 1953-ban?", "Angliát", "Németországot", "Brazíliát", "A hazai pályán 90 éve veretlen angol válogatottat a magyar csapat leiskolázta a forradalmi, gyors passzos játékával."]],
        3000: [["Hogy hívták az Aranycsapat legendás, fekete mezes kapusát, akit a 'Fekete Párducnak' is becéztek?", "Grosics Gyula", "Király Gábor", "Gulácsi Péter", "Grosics újított a kapusposzton, mert gyakran a tizenhatoson kívülre kifutva, afféle negyedik hátvédként irányította a meccset."]],
        4000: [["Melyik hatalmas budapesti stadiont építették fel (és adták át az 50-es évek elején), ahol az Aranycsapat 7:1-re verte az angolokat a visszavágón?", "Népstadion", "Groupama Aréna", "Üllői úti stadion", "A hatalmas betonkaréj, a Népstadion évtizedekig a magyar sportélet központja volt, mielőtt Puskás Arénaként újjáépítették."]],
        5000: [["Ki volt az Aranycsapat zseniális szövetségi kapitánya, aki megalkotta a csapat taktikáját és győzelmeit?", "Sebes Gusztáv", "Mészöly Kálmán", "Illovszky Rudolf", "Sebes Gusztáv dolgozta ki a 'hátravont középcsatár' posztját Hidegkuti Nándornak, ami megoldhatatlan feladat elé állította az ellenfeleket."]]
    }},
    { c: "Valentinnap Titkai", q: {
        1000: [["Melyik téli hónapban (és napon) ünnepeljük a szerelmesek nemzetközi napját, a Valentin-napot?", "Február 14.", "Január 1.", "Március 8.", "A Bálint-napként is ismert ünnep az elmúlt évtizedekben az egész világon a szerelmesek legfőbb napja lett."]],
        2000: [["Milyen színű rózsát szokás a leggyakrabban ajándékozni a lángoló, mindent elsöprő szerelem jelképeként?", "Vöröset (Pirosat)", "Fehéret", "Sárgát", "A vörös rózsa évezredek óta az epekedés, a szenvedély és a romantika univerzális szimbóluma."]],
        3000: [["Kicsoda az a pufók, angyalszárnyas, görög/római isten, aki a nyilával szíven lövi a kiszemelteket, hogy szerelembe essenek?", "Cupido (Ámor)", "Zeusz", "Herkules", "Cupido nyila a hiedelmek szerint azonnali és visszavonhatatlan szerelmet ébreszt abban, akit eltalál."]],
        4000: [["Kinek a nevéről (melyik szent nevéről) kapta a magyar naptárban az ünnep a Bálint-nap elnevezést?", "Szent Bálint püspökről", "Szent Istvánról", "Szent Péterről", "A legenda szerint Szent Bálint a császári tiltás ellenére titokban esketett össze szerelmes katonákat."]],
        5000: [["Milyen édességet adnak a párok legtöbbször ezen a napon, elegáns, szív alakú, piros dobozba csomagolva?", "Csokoládé bonbont", "Gumicukrot", "Rágógumit", "Az édes csokoládé és a pralinék a 19. század óta a Valentin-nap legnépszerűbb és leghagyományosabb ajándékai."]]
    }},
    { c: "Esküvői Hagyományok", q: {
        1000: [["Milyen színű ruhát visel hagyományosan a menyasszony az esküvőn a nyugati kultúrában a tisztaság jelképeként?", "Fehéret", "Pirosat", "Feketét", "A fehér esküvői ruha divatját Viktória brit királynő indította el a 19. században."]],
        2000: [["Mit dob hátra a menyasszony az esküvői bulin a hajadon lányok közé (amiből kiderül, ki megy legközelebb férjhez)?", "A menyasszonyi csokrot", "A fátylat", "A cipőjét", "A babona szerint az a lány, aki elkapja a levegőben szálló virágcsokrot, a következő lesz az oltár előtt."]],
        3000: [["Milyen apró, fehér szemeket szórnak a friss házasokra a templomból kijövet a termékenység és a gazdagság jelképeként?", "Rizst", "Kristálycukrot", "Sót", "A rizsszórás egy ősi hagyomány, bár ma már sok helyen virágszirmokkal vagy buborékfújással helyettesítik."]],
        4000: [["Mit kell viselnie a menyasszonynak a hagyományos angolszász (és itthon is elterjedt) babona szerint: Valami régit, valami újat, kölcsönkapottat és...", "...valami kéket", "...valami pirosat", "...valami aranyat", "A kék szín hagyományosan a hűséget, a szeretetet és a tisztaságot szimbolizálta az ősi esküvőkön."]],
        5000: [["Hogy hívják azt a zenés-táncos lakodalmi hagyományt, ahol éjfélkor a feleség már új (általában piros) ruhában táncol a vendégekkel pénzért cserébe?", "Menyecsketánc", "Nyitótánc", "Apás tánc", "A menyecsketánccal a lány jelképesen asszonnyá válik, a vendégek pedig a 'fazékba' dobott pénzzel támogatják az ifjú párt."]]
    }},
    { c: "Szerelmes Kifejezések", q: {
        1000: [["Kivel esik szerelembe az a személy, akit a mondás szerint 'első látásra' talál el a szerelem?", "Azonnal azzal, akit épp meglátott", "Egy régi baráttal", "Saját magával", "Az első látásra szerelem az az érzés, amikor két ismeretlen ember azonnal, megmagyarázhatatlan vonzalmat érez egymás iránt."]],
        2000: [["Milyen színű 'köd' ereszkedik a friss szerelmesekre a közmondás szerint, amitől a világot és a párjukat hibátlannak látják?", "Rózsaszín köd", "Lila köd", "Fekete felhő", "Amikor valaki a 'rózsaszín felhőkben' vagy 'rózsaszín ködben' jár, az a mindent elsöprő boldogság időszaka."]],
        3000: [["Milyen rovarok 'repkednek' a gyomrában annak, aki nagyon izgul a szerelme vagy az első randevú miatt?", "Pillangók (Pillangók a gyomorban)", "Darazsak", "Katicabogarak", "Ez az idegesség és várakozás okozta kellemes, bizsergető érzés a gyomorban az izgalom fizikai tünete."]],
        4000: [["Fejezd be a klasszikus magyar szólást, ami az egymáshoz tökéletesen illő párokra utal: 'Megtalálta a zsák a...'", "...foltját", "...párját", "...lyukát", "A 'zsák a foltját' azt jelenti, hogy két ember mind jó tulajdonságaiban, mind hibáiban tökéletesen kiegészíti egymást."]],
        5000: [["Mit mondunk arra az emberre (és a szerelemre magára), aki az érzelmei miatt egyáltalán nem veszi észre a szerelme rossz tulajdonságait?", "Vak a szerelem", "Süket a szerelem", "Néma a szerelem", "A mondás arra utal, hogy a szerelmes ember sokszor képtelen az objektív és racionális ítélőképességre."]]
    }},
    { c: "Magyar Szerelmes Dalok", q: {
        1000: [["Melyik legendás együttes énekelte 1990-ben a hatalmas slágert: 'Szeretni valakit valamiért, eszembe jutottál erről...'?", "Republic", "Omega", "Bikini", "Bódi László 'Cipő' egyedi hangja és a Republic őszinte dalszövegei generációk szerelmi himnuszai lettek."]],
        2000:[["Ki énekelte az ikonikus, könnyfakasztó és romantikus 'Elmegyek, elmegyek...' kezdetű zseniális lírai dalt?", "Máté Péter", "Zámbó Jimmy", "Demjén Ferenc", "Máté Péter dalait a mai napig rongyosra játsszák az esküvőkön és a romantikus estéken."]],
        3000: [["'Gyertyák égnek a sötétben...' – Melyik kultikus magyar együttes hatalmas, érzelmes slágere az 'Örökké tart'?", "LGT (Locomotiv GT)", "Edda Művek", "Piramis", "Presser Gáborék balladája a magyar rock- és poptörténelem egyik legszebb szerelmes vallomása."]],
        4000: [["Kinek a kultikus, rendkívül érzelmes és drámai dala az 'Egy jó asszony mindent megbocsát'?", "Zámbó Jimmy", "Horváth Charlie", "Korda György", "A 'Király' elképesztő hangterjedelmével és szívbemarkoló előadásmódjával nők millióit hódította meg a 90-es években."]],
        5000: [["Kinek az ikonikus, rekedtes hangján szólal meg a pultnál ülő szerelmesek dala, a 'Jég dupla whiskyvel'?", "Horváth Charlie", "Somló Tamás", "Presser Gábor", "Charlie füstös, rekedtes hangja a magyar könnyűzene legjellegzetesebb orgánuma a lassú, szerelmes és szakítós dalokban."]]
    }},
    { c: "Nemzetközi Romantikus Slágerek", q: {
        1000: [["Melyik csodálatos hangú énekesnő énekelte az 'I Will Always Love You' című dalt a Több mint testőr című filmben?", "Whitney Houston", "Mariah Carey", "Celine Dion", "A dal refrénjének elképesztő kiéneklése a mai napig a tehetségkutatók legnagyobb kihívása az énekesek számára."]],
        2000: [["Melyik brit, vöröshajú énekes hódította meg az esküvőket a 'Perfect' és a 'Thinking Out Loud' című gyönyörű balladákkal?", "Ed Sheeran", "Sam Smith", "Justin Bieber", "Ed Sheeran egyetlen akusztikus gitárral képes olyan romantikus atmoszférát teremteni, amitől milliók olvadnak el."]],
        3000: [["Ki fújja a híres, fülbemászó és szexi szaxofon-szólót a 'Careless Whisper' című örökzöld slágerben?", "George Michael (Wham!)", "Elton John", "Phil Collins", "A Careless Whisper szaxofon intrója a poptörténelem legikonikusabb és legismertebb zenei pillanatai közé tartozik."]],
        4000: [["Melyik legendás együttes énekelte 1967-ben, hogy 'All You Need Is Love' (Minden, amire szükséged van, az a szerelem)?", "The Beatles", "The Rolling Stones", "Queen", "John Lennonék dala az 1960-as évek béke- és szeretet-mozgalmának (a 'Summer of Love'-nak) lett a himnusza."]],
        5000: [["Melyik r&b és soul énekes feleségének (Chrissy Teigennek) írta az 'All of Me' (Mindenem) című, világszerte játszott szerelmes dalt?", "John Legend", "Bruno Mars", "The Weeknd", "A zongorára épülő dal őszinte szerelmi vallomás, ami a YouTube-on is milliárdos nézettséget ért el."]]
    }},
    { c: "Csókok és Puszik", q: {
        1000: [["Melyik európai országról nevezték el a mély, szenvedélyes, nyelveket is összeérintő romantikus csókot?", "Franciaország (Francia csók)", "Olaszország", "Spanyolország", "A 'French kiss' a szenvedély és a beteljesült szerelem legismertebb kifejezése a popkultúrában."]],
        2000: [["Hogy hívják azt a puszit, amit az ajkak fizikai érintése nélkül, csak a levegőbe cuppantva küldenek a távolból?", "Levegőpuszi (Dobott puszi)", "Eszkimó puszi", "Kézcsók", "A sztárok gyakran osztanak levegőpuszikat a vörös szőnyegen a rajongóknak és a kameráknak."]],
        3000: [["Melyik őslakos, hidegben élő népről kapta a nevét az az aranyos gesztus, amikor a szerelmesek az orrukat dörzsölik össze?", "Eszkimó puszi", "Indián puszi", "Lapp puszi", "Mivel a hideg miatt sokszor csak az arcuk (orruk) látszott ki a meleg ruhából, az inuitok így fejezték ki a szeretetüket."]],
        4000: [["Milyen testrészre adták régen a férfiak (sokszor enyhén meghajolva) a puszit a nőknek a mély tisztelet és hódolat jeléül?", "A kézfejükre (Kézcsók)", "A homlokukra", "A nyakukra", "A kézcsók az elegancia és a lovagiasság csúcsa volt a régi társasági eseményeken és bálokon."]],
        5000: [["Mit szimbolizál az esküvői szertartások legvégén, az oltár előtt elcsattanó hivatalos, romantikus 'Hitvesi csók'?", "A házasság megpecsételését (a szövetséget)", "A buli kezdetét", "A gyűrűk átadását", "A pap vagy anyakönyvvezető híres mondata: 'Most már megcsókolhatja a menyasszonyt!' a ceremónia fénypontja."]]
    }},
    { c: "A Randizás Világa", q: {
        1000: [["Hogy hívják azt a sokszor kínos, de izgalmas eseményt, amikor két ember úgy találkozik egy romantikus randira, hogy előtte sosem látták egymást?", "Vakrandi", "Villámrandi", "Tandem randi", "A vakrandit általában barátok vagy ismerősök szervezik meg abban a reményben, hogy a két ember összeillik majd."]],
        2000: [["Melyik az a világméretű mobilos társkereső alkalmazás, ahol balra vagy jobbra 'húzva' (swiping) lehet profilt választani és párt találni?", "Tinder", "Facebook", "Instagram", "A Tinder alapjaiban változtatta meg a modern ismerkedést, ahol a 'Match' (egyezés) az első lépés a randevú felé."]],
        3000: [["Milyen tipikus, romantikus megvilágítást és kelléket választanak az elegáns éttermek a szerelmesek asztalánál a hangulat fokozására?", "Gyertyát (Gyertyafényes vacsora)", "Neonfényt", "Stroposzkópot", "A tompa, meleg, vibráló gyertyafény romantikus, intim és meghitt légkört teremt a vacsorához."]],
        4000: [["Mi az a 'Ghosting' (szellemmé válás) a modern randizási szlengben, ami nagyon tud fájni a másik félnek?", "Amikor valaki szó nélkül, nyomtalanul eltűnik és nem válaszol többé", "Amikor valaki titokban követi a másikt", "Amikor valaki álnéven randizik", "A ghosting az egyik legkegyetlenebb szakítási forma, mivel a másik fél semmilyen magyarázatot nem kap a végre."]],
        5000: [["Melyik sor a legnépszerűbb hagyományosan a moziban a friss szerelmespárok körében, mert ott a legkisebb az esélye, hogy zavarják őket hátulról?", "A leghátsó sor", "A legelső sor", "A középső sor", "A 'hátsó sorban a sötétben' a romantikus tinédzserkori filmes randevúk legkedveltebb és legikonikusabb helyszíne."]]
    }},
    { c: "Szerelmes Szimbólumok", q: {
        1000: [["Milyen ikonikus, egyszerű geometriai formával (és sokszor piros színnel) jelöljük az életet, a dobbanást és a szerelmet egyaránt?", "Szív (Szív alak)", "Kör", "Csillag", "A piros szív a világ legfelismerhetőbb és leguniverzálisabb szimbóluma az érzelmek kifejezésére."]],
        2000: [["Milyen nemesfémből (vagy drágakőből) készült ékszert húznak a szerelmesek egymás ujjára az eljegyzés és az esküvő során?", "Gyűrűt (Jegygyűrűt)", "Karkötőt", "Nyakláncot", "A gyűrű, mivel nincs se eleje, se vége, az örökkévalóságot és a megszakíthatatlan köteléket jelképezi."]],

        2000: [["Milyen ikonikus, fekete, V8-as motorral rendelkező autóval utaznak a fiúk az epizódok során?", "Egy 1967-es Chevrolet Impalával", "Egy Ford Mustanggal", "Egy Dodge Chargerrel", "A 'Baby' névre hallgató klasszikus autó a sorozat harmadik legfontosabb szereplője (a csomagtartója pedig tele van fegyverekkel)."]],
        3000:[["Milyen hétköznapi, a konyhában is megtalálható anyaggal védekeznek a fiúk a szellemek ellen a legtöbbször?", "Sóval (Sókörrel vagy puskába töltve)", "Borssal", "Cukorral", "Az ablakok és ajtók elé szórt sóvonal, valamint a sótöltényes fegyverek alapvető védelmet nyújtottak a természetfeletti ellen."]],
        4000: [["Ki az a ballonkabátos angyal, aki a pokolból hozta vissza Deant, és a fiúk legjobb barátja lett?", "Castiel", "Lucifer", "Gábriel", "A Misha Collins által játszott, az emberek világát sokszor furcsán szemlélő Castiel közönségkedvenc karakterré vált."]],
        5000: [["Melyik klasszikus rockdal szólalt meg hagyományosan minden évad (kivéve az első) utolsó epizódjának az elején az 'Eddig történt' alatt?", "Carry On Wayward Son (a Kansastől)", "Highway to Hell", "Eye of the Tiger", "Az ikonikus dal taktusai mindig az epikus évadzáró finálét jelezték a rajongóknak."]]
    }},
    { c: "Hősök (Heroes)", q: {
        1000: [["Mi volt a sorozat első évadának leghíresebb, a jövő megmentésére felszólító szlogenje?", "Mentsd meg a pompomlányt, mentsd meg a világot!", "Az erő veled van!", "A jövő a kezedben van!", "A halhatatlan pompomlány, Claire Bennet megmentése volt a kulcs New York pusztulásának elkerüléséhez."]],
        2000:[["Kicsoda a Hősök sorozat kegyetlen, órásmesterből lett főgonosza, aki elveszi a többiek képességeit?", "Sylar (Gabriel Gray)", "Peter Petrelli", "Gomez", "Sylar az áldozatai agyának felnyitásával tette magáévá azok szuperképességeit."]],
        3000: [["Milyen különleges hatalma volt Hiro Nakamurának, a japán irodai dolgozónak?", "Képes volt megállítani az időt és teleportálni", "Képes volt repülni", "Láthatatlanná tudott válni", "A folyton 'Yatta!' (Megcsináltam!) felkiáltással örülő Hiro a sorozat legpozitívabb és legkalandosabb karaktere volt."]],
        4000: [["Mit csinált Isaac Mendez, a drogfüggő festőművész a képessége segítségével?", "A jövőt festette le a képein (transzban)", "Életre keltette a festményeit", "Látta az emberek múltját", "A Hősök rengeteg képregényes elemet használt, Isaac festményei pedig előrevetítették az évad eseményeit."]],
        5000: [["Kinek a szuperképessége volt az, hogy képes volt bármilyen másik hős erejét lemásolni, ha a közelébe ért?", "Peter Petrelli", "Nathan Petrelli", "Mohinder Suresh", "A jószívű ápoló, Peter az 'empátia' révén vált a világ legerősebb (és legveszélyesebb) emberévé a sorozatban."]]
    }},
    { c: "Főzős Reality-k (2000-es évek)", q: {
        1000: [["Hogy hívták a TV2 nagysikerű celebes főzőműsorát, ahol a sztárok egymást látták vendégül otthonukban?", "Hal a tortán", "Vacsoracsata", "Séfek séfe", "A 'Hal a tortán' narrátora gyakran szarkasztikus megjegyzéseket tett a sztárok főzési tudományára."]],
        2000: [["Mi volt az RTL Klub válasza a Hal a tortán sikerére (amit szintén celebekkel forgattak)?", "Vacsoracsata", "A Konyhafőnök", "Főzd le a sztárt!", "A Vacsoracsata hasonló formátumban futott, a sztárok pontozták egymás háromfogásos menüjét és a vendéglátást."]],
        3000: [["Ki volt az a paprikás és zsíros ételeket kedvelő magyar séf, akihez legendás internetes paródiák ('Zsíros kenyér, zsiradékkal') is köthetők?", "Benke Laci bácsi", "Fördős Zé", "Krausz Gábor", "Laci bácsi joviális, régi vágású főzőműsorait később rengetegen parodizálták a bőséges zsiradék-használata miatt."]],
        4000: [["Melyik szakács vezette a TV2 'Stahl Konyhája' mellett a legnépszerűbb magyar receptműsorokat a 2000-es évek elején?", "Kovács Lázár", "Rácz Jenő", "Gáspár Bea", "Lázár séf a 'Receptklub' című műsorban (Kaszás Gézával) mutatta be a gyors és modern konyhát."]],
        5000: [["Melyik valóságshow-győztes (és énekes) robbantott ki hatalmas botrányt, amikor a vendégeit egy KFC-ből rendelt csirkével etette meg saját főztje helyett?", "Gáspár Laci", "Majka", "Alekosz", "Az eset ikonikus lett: a sztár nem akart főzni, ezért gyorséttermi ételeket tálalt fel a megrökönyödött vendégeknek."]]
    }},
    { c: "Esti Fókusz és Aktív", q: {
        1000: [["Hogy hívták az RTL Klub mindennapos, kora esti bulvár és magazinműsorát, ami a mai napig fut?", "Fókusz", "Aktív", "Napló", "A Fókusz a 'Szenzációk, furcsaságok, emberi sorsok' szlogennel indult a csatorna kezdete óta."]],
        2000: [["Mi volt a címe a TV2 hasonló időben adott bulvárműsorának, ami éveken át a Fókusz legnagyobb riválisa volt?", "Aktív", "Tények Plusz", "Magellán", "Az Aktív, majd a Magellán szolgáltatták a bulvárhíreket és a sztárpletykákat a TV2 képernyőjén."]],
        3000: [["Kik voltak a Fókusz ikonikus, legelső műsorvezetői a 90-es évek végétől a 2000-es évekig?", "Batiz András és Marsi Anikó", "Gönczi Gábor és Barabás Éva", "Pálffy István és Erős Antónia", "A páros letisztult, profi vezetése megalapozta a magazinműsorok sikerét Magyarországon."]],
        4000: [["Ki utazta be a világot a különleges reportműsoraival, kávézva a világ legveszélyesebb bűnözőivel és politikusival?", "Frei Tamás (Frei Dosszié)", "Vujity Tvrtko", "Havas Henrik", "A Frei Dosszié riportjai az orosz maffiáról, afrikai törzsekről és hollywoodi sztárokról mindig kiemelkedő nézettséget hoztak."]],
        5000: [["Milyen védjegye volt Vujity Tvrtkónak, a TV2 'Napló' című riportműsorának sztár-újságírójának?", "Mindig (kockás) sapkát viselt a stúdióban is", "Mindig napszemüvegben volt", "Rövidnadrágban vezetett műsort", "A sapka az imidzsének elválaszthatatlan része lett, amit a legkomolyabb díjátadókon sem vett le."]]
    }},
    { c: "Szombat Esti Láz", q: {
        1000: [["Milyen műfajban versenyeztek a magyar celebek az RTL Klub 'Szombat Esti Láz' című nagyszabású műsorában?", "Társastánc (Versenytánc)", "Éneklés", "Korcsolyázás", "A sztárok profi táncpartnereket kaptak, akikkel hetekig próbálták a keringőt, a tangót vagy a cha-cha-chát."]],
        2000: [["Ki volt az a profi táncosnő (és később zsűritag), aki a műsor ikonikus arcává vált (és sokszor volt partnere Stohl Andrásnak a műsorvezetésben vagy a parketten)?", "Südi Iringó", "Keleti Andrea", "Ördög Nóra", "Südi Iringó energikus táncai és göndör haja miatt az ország egyik kedvencévé vált a 2000-es években."]],
        3000: [["Kik vezették az első szériákban a műsort, akik akkoriban az RTL Klub legfontosabb arcai voltak?", "Ördög Nóra és Stohl András", "Liptai Claudia és Majka", "Sebestyén Balázs és Vadon Jani", "Nóri és 'Buci' tökéletes párosként irányították az élő, elegáns showműsorokat szombat esténként."]],
        4000: [["Melyik színész (a Barátok közt egykori sztárja) nyerte meg a legelső, 2006-os Szombat Esti Láz szezont Südi Iringó oldalán?", "Czvetkó Sándor (Téves: Czvetkó a hang, a helyes: Somló/Hujber/stb. Pontosítás: Czene Attila vagy Somló? Valójában: Czene Attila nyert Bánhidi Petrával.) Melyik híresség nyerte a legelső évadot?", "Czene Attila (olimpikon)", "Szőke Zoltán", "Hujber Ferenc", "Czene Attila, az olimpiai bajnok úszó bizonyította, hogy a parketten is ő a legjobb, Bánhidi Petra oldalán."]],
        5000: [["Ki volt az a szigorú, mégis humoros táncművész és koreográfus zsűritag, aki mindig a legkeményebb kritikákat adta a versenyzőknek?", "Pálinkó Lujza (vagy Böhm György / Illyés Jenő)", "Böhm György", "Benkő Dániel", "A színházi rendező Böhm György a 'Szombat Esti Láz' Simon Cowellje volt, kíméletlen őszinteségével."]]
    }},
    { c: "Győzike Show", q: {
        1000: [["Kinek az életét követte nyomon Magyarország első, gigantikus sikerű 'családi' reality-műsora az RTL Klubon?", "Gáspár Győző (Győzike) és családja", "Zámbó Jimmy családja", "A Korda házaspár", "A Romantic együttes frontemberének salgótarjáni élete éveken át a legnézettebb hazai műsor volt."]],
        2000: [["Milyen állatminta borította be a Gáspár család házának, bútorainak és autóinak a nagy részét a műsorban?", "Zebracsíkos", "Párducfoltos", "Tigriscsíkos", "A zebrás kanapéktól a zebrás BMW-ig minden ezt a mintát kapta, ami a show egyik legnagyobb védjegye lett."]],
        3000: [["Hogy hívták Győzike feleségét és két lányát, akik a műsor elválaszthatatlan szereplői voltak?", "Bea asszony, Evelin és Virág", "Mariann, Zsanett és Kitti", "Gabi, Andi és Réka", "A család veszekedései, kibékülései és nyaralásai (sokszor megrendezett szituációkkal) adták a sorozat lelkét."]],
        4000: [["Hogy hívták azt az állatot (házi kedvencet), akitől Bea asszony rettegett a házban?", "Egy malac (vagy kaméleon)", "Egy oroszlán", "Egy pók", "A malac (és egyéb furcsa állatok) behozatala a házba gyakori humorforrás volt a rendezett jelenetekben."]],
        5000: [["Melyik magyar popzenei formáció frontembere volt Győző a reality előtt és alatt?", "Romantic", "Fekete Vonat", "TNT", "Völgyi Zsuzsi és Kunovics Katinka hatalmas hangja vitte a hátán az együttest, míg Győző főként rap/szövegbetétekkel szerepelt."]]
    }},
    { c: "Betlefonálós Tévéjátékok", q: {
        1000: [["Mi volt a fő bevételi forrása a hajnalban (vagy napközben) sugárzott, találós kérdéseket feltevő 'Telekvíz' típusú műsoroknak?", "Az emelt díjas SMS-ek és hívások", "A reklámszünetek", "A műsorvezetők fizetése", "A nézőknek percenként több száz forintot kellett fizetniük, hogy egyáltalán esélyük legyen adásba kerülni."]],
        2000: [["Mit kellett gyakran megtalálniuk a nézőknek a képernyőn lévő összekevert betűk között?", "Egy értelmes magyar szót (pl. állat, város neve)", "Egy telefonszámot", "Egy hibát a képen", "A műsorvezetők órákig kiabáltak: 'Senki nem tud egy négybetűs állatot?!', miközben a megoldás sokszor direkt túl egyértelmű volt."]],
        3000: [["Milyen kártyákkal és kövekkel dolgoztak a betelefonálós, éjszakai 'Ezo TV' jellegű műsorok jósai a tévében?", "Tarot kártyákkal (és ingával)", "Francia kártyával", "Póker zsetonokkal", "A 'látók' telefonon keresztül rontáslevételt és szerelmi kötést is végeztek jó pénzért az éjszakai műsorsávban."]],
        4000: [["Mit csinált a műsorvezető (általában egy fiatal lány), amikor már 20 perce nem érkezett 'sikeres' hívás a stúdióba?", "Könyörgött, dühöngött, vagy 'sírt' élő adásban", "Kikapcsolta a gépet", "Énekelni kezdett", "A manipulációs taktika része volt a sürgetés: 'Itt áll a vonal, lejár az idő, miért nem hív senki?!'"]],
        5000: [["Miért tiltotta be (vagy korlátozta szigorúan) végül a médiahatóság ezeket a műsorokat?", "Mert tisztességtelen kereskedelmi gyakorlatot és burkolt szerencsejátékot folytattak", "Mert túl unalmasak voltak", "Mert a műsorvezetők káromkodtak", "Rengeteg gyanútlan néző százezres telefonszámlákat halmozott fel, miközben a gép sosem kapcsolta be őket élő adásba."]]
    }},
    { c: "A mi kis falunk", q: {
        1000: [["Mi a neve annak a kitalált falunak, ahol a sorozat játszódik?", "Pajkaszeg", "Makkoshotyka", "Ökörapáti", "A sorozat ikonikus helyszíne Pajkaszeg, aminek a valóságban Pilisszentlélek ad otthont."]],
        2000: [["Ki alakítja a falu ravasz, kissé korrupt, de jószívű polgármesterét, Füleki Károlyt?", "Csuja Imre", "Reviczky Gábor", "Lengyel Tamás", "Csuja Imre 'Polgija' a sorozat lelke, aki mindig azon ügyködik, hogyan szerezzen pénzt a falu kasszájába."]],
        3000: [["Milyen autót (és milyen színűt) vezet Gyuri, a falu ügyeskedő macsója?", "Piros Lada", "Zöld Trabant", "Fehér Zsiguli", "A piros Lada és a benne bömbölő retro zene Gyuri (Lengyel Tamás) elválaszthatatlan védjegyei."]],
        4000:[["Kibe szerelmes reménytelenül a falu fiatal és jóképű papja, János?", "Tecába, a kocsmárosnőbe", "Erikába", "Szinyei Mártába", "A pap és az öntudatos pultoslány, Teca közötti feszültség a sorozat egyik legfőbb romantikus szála."]],
        5000: [["Hogy hívják a falu ikonikus rendőrét, aki folyton a szabályzatot idézi, de sosem fog el bűnözőt?", "Stoki", "Baki", "Szifon", "Stoki a biciklijével, a traffipaxszal és a túlbuzgóságával tartja 'rendben' a Pajkaszegi utcákat."]]
    }},
    { c: "Drága örökösök", q: {
        1000: [["Hol játszódik az RTL Klub nagysikerű napi sorozata, a Drága örökösök?", "Ökörapáti", "Pajkaszeg", "Csillagkút", "A történet szerint a budapesti Szappanos család ebbe az eldugott faluba kényszerül költözni."]],
        2000: [["Mi Kálmán bácsi (a nagypapa) végrendeletének legfőbb feltétele, hogy a család megkapja a 612 millió forintot?", "Egy évet a faluban kell élniük", "Meg kell házasodniuk", "El kell adniuk a házat", "Ha bármelyik örökös 12 óránál tovább elhagyja a falu határát, kiesik az örökségből."]],
        3000: [["Ki játszotta Kálmán bácsit, a trükkös nagypapát, aki a sorozat elején 'meghal'?", "Koltai Róbert", "Bodrogi Gyula", "Csuja Imre", "Koltai Róbert karaktere a háttérből, titokban mozgatta a szálakat és nevelte meg a kapzsi családját."]],
        4000: [["Hogy hívják a falu kocsmárosát, a panzió tulajdonosát, aki a sorozat egyik központi, titokzatos figurája?", "Szláven", "Jovi", "Tibor", "A horvát származású Szláven minden problémát megoldott a faluban, és sötét titkokat rejtegetett."]],
        5000: [["Milyen rokoni kapcsolatban áll egymással Tibi (Lengyel Ferenc) és Mónika (Járó Zsuzsa)?", "Testvérek", "Férj és feleség", "Apa és lánya", "Kálmán bácsi két gyermeke között az örökség miatt folyamatos a versengés és a feszültség."]]
    }},
    { c: "Keresztanyu", q: {
        1000: [["Milyen határ menti kitalált faluban játszódik a Keresztanyu című sorozat?", "Makkosszállás", "Ökörapáti", "Bátrak földje", "A falu az ukrán-magyar határon fekszik, ami tökéletes helyszínt biztosít a csempészeknek."]],
        2000:[["Ki alakítja a címszereplőt, Róza mamát, a makkosszállási csempészhálózat fejét?", "Molnár Piroska", "Hernádi Judit", "Básti Juli", "A Nemzet Színésze, Molnár Piroska zseniálisan hozza a szigorú, de igazságos maffiavezér-nagymamát."]],
        3000: [["Mit csempész a család a leggyakrabban a zöldhatáron keresztül Ukrajnából?", "Cigarettát", "Fegyvereket", "Ruhákat", "A cigarettacsempészet adja a falu feketegazdaságának alapját, amit Róza mama irányít vasszigorral."]],
        4000: [["Milyen posztra pályáznak Róza mama családtagjai a történet elején?", "A Keresztanyu utódja akar lenni valaki a hálózat élén", "Polgármesterek akarnak lenni", "A rendőrfőnöki posztra", "Róza mama bejelenti, hogy visszavonul, és egy választás során akarja átadni a hálózat vezetését."]],
        5000:[["Kicsoda Tivadar a sorozatban, aki Róza mama veje?", "A helyi rendőrfőnök", "A pap", "A kocsmáros", "A Lengyel Ferenc által alakított Tivadar a rendőrség vezetőjeként próbál (sikertelenül) lecsapni a saját családja csempészüzletére."]]
    }},
    { c: "Aranyélet (HBO)", q: {
        1000: [["Melyik család drámáját és bűnözői életét mutatja be az HBO nagysikerű magyar sorozata?", "Miklósi család", "Berényi család", "Varga család", "A Miklósi család (Attila, Janka, Márk és Mira) a látszat-luxus fenntartásáért a legmélyebb bűnökbe süllyed."]],
        2000: [["Milyen jelmondattal (szlogennel) híresült el a sorozat, ami a főszereplők életfilozófiája is volt?", "Bármit megtehetsz, csak ne bukj le!", "A család mindenek felett!", "Pénz beszél, kutya ugat!", "A Miklósi család mindent a látszatnak rendelt alá, amíg a hazugságaik utol nem érték őket."]],
        3000: [["Ki játssza Miklósi Jankát, az elvárásokkal teli, a luxushoz minden áron ragaszkodó feleséget?", "Ónodi Eszter", "Gryllus Dorka", "Dobó Kata", "Ónodi Eszter zseniális alakításában Janka a magyar televíziózás egyik legkomplexebb, sokszor kegyetlen női karaktere lett."]],
        4000: [["Kicsoda Hollós Endre (Anger Zsolt alakításában) a sorozatban?", "Attila fiatalkori barátja és a család alvilági mentora", "A nyomozó, aki el akarja kapni őket", "Janka testvére", "Endrebá a keresztapa-figura, aki minden piszkos munkát elintéz, de végül ő is a múlt árnyékába kerül."]],
        5000: [["Milyen tragikus sorsú esemény miatt kényszerült a család a 90-es években a bűnözés útjára az előzmények szerint?", "Hollós és Attila véletlenül halálos balesetet okoztak csempészés közben", "Elvették a házukat a bankok", "Kártyaadósságba keveredtek", "A rendszerváltáskori olajszőkítés és csempészet egy balesetbe torkollt, ami örökre összekötötte a szereplőket."]]
    }},
    { c: "Besúgó és Terápia (HBO)", q: {
        1000: [["Melyik évtizedben játszódik A Besúgó című, KISZ-táborokat és egyetemi lázadásokat bemutató sorozat?", "1980-as évek (1985)", "1950-es évek", "1990-es évek", "A történet a Kádár-korszak legvégén mutatja be egy állambiztonság által beszervezett egyetemista fiú életét."]],
        2000: [["Mi volt a főszereplő Geri (Váradi Gergely) állambiztonsági fedőneve, akit zsarolással szerveztek be?", "Sakkozó", "Zenész", "Költő", "Gerit az öccse gyógyszerei miatt kényszerítették arra, hogy a kollégiumi ellenzéki csoportról ('Száva Zsoltról') jelentsen."]],

        let myRoomId = null, myRole = null, roomData = null, boardRendered = false;

        const cleanDateStr = (d) => d.toLocaleDateString('hu-HU', {timeZone: 'Europe/Budapest'}).replace(/[\s\u202F\u00A0]/g, '');
        const getToday = () => cleanDateStr(new Date());
        const getYesterday = () => { let d = new Date(); d.setDate(d.getDate()-1); return cleanDateStr(d); };

        const showScreen = (id) => { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); };
        const shuffle = (a) => { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[a[i], a[j]] = [a[j], a[i]]; } return a; };

        async function createRoomData(p1n, p2n, state = 'lobby', isOffline = false) {
            boardRendered = false; localEndSoundPlayed = false; endProcessed = false;
            
            let usedQuestions = {};
            let updatedUsed = {};
            const now = Date.now();
            const oneHour = 60 * 60 * 1000;

            if (!isOffline) {
                try {
                    const snap = await db.collection("globals").doc("used_questions").get();
                    if(snap.exists) usedQuestions = snap.data() || {};
                } catch(e) {}
                
                for (let key in usedQuestions) {
                    if (now - usedQuestions[key] < oneHour) {
                        updatedUsed[key] = usedQuestions[key];
                    }
                }
            }

            let shuffledBank = shuffle([...fullBank]);
            let cats =[];

            for (let c of shuffledBank) {
                if (cats.length >= 4) break;
                
                let validQuestions =[];
                for (let v of[1000, 2000, 3000, 4000, 5000]) {
                    const pool = c.q[v];
                    let avail = pool.filter(r => !updatedUsed[r[0]]);
                    if (avail.length === 0) avail = pool; 
                    
                    const r = avail[Math.floor(Math.random() * avail.length)];
                    validQuestions.push({ points: v, q: r[0], correct: r[1], options: shuffle([r[1], r[2], r[3]]), desc: r[4] });
                    
                    if (!isOffline) updatedUsed[r[0]] = now;
                }
                cats.push({ category: c.c, flipped: false, questions: validQuestions });
            }

            let availSpeed = speedBank.filter(q => !updatedUsed[q.q]);
            if (availSpeed.length === 0) availSpeed = speedBank;
            const sqData = availSpeed[Math.floor(Math.random() * availSpeed.length)];
            if (!isOffline) updatedUsed[sqData.q] = now;

            const speedQ = { points: 0, q: sqData.q, correct: sqData.correct, options: shuffle([...sqData.options]), desc: sqData.desc };
            const bonuses = {};
            for(let i=0; i<3; i++) bonuses[`${Math.floor(Math.random()*4)}-${Math.floor(Math.random()*5)}`] = 2000;

            const data = {
                gameState: state, p1: { name: p1n, score: 0, left: false }, p2: { name: p2n, score: 0, left: false },
                board: cats, unlockedRows:[0,0,0,0], currentQ: speedQ, phase: 'idle', bonuses: bonuses,
                activePlayer: null, stealMode: false, wrongAnswers:[], selectedOption: null, 
                rematch: { p1: false, p2: false }, lastWrongPlayer: null, turn: isOffline ? 'p1' : null, 
                speedQMode: !isOffline, saved: false, wildBlink: false, buzzTime: null
            };

            if(myRole === 'offline') {
                roomData = data; 
            } else {
                await db.collection("rooms").doc(myRoomId).set(data);
                db.collection("globals").doc("used_questions").set(updatedUsed).catch(e=>{});
            }
        }

                myRoomId = code; myRole = 'p2';
                await db.collection("rooms").doc(code).update({ "p2.name": n, gameState: 'speed_q' });
                listen();
            } else alert("Nincs ilyen szoba!");

        function listen() {
            db.collection("rooms").doc(myRoomId).onSnapshot(snap => {
                if(snap.exists) {
                    roomData = snap.data();
                    const other = myRole === 'p1' ? 'p2' : 'p1';
                    if(roomData[other].left && roomData.gameState !== 'end') {
                        const total = roomData.p1.score + roomData.p2.score;
                        updateRoom({ gameState: 'end',[`${myRole}.score`]: total,[`${other}.score`]: 0, exitNote: true });
                        return;
                    }
                    if(roomData.gameState !== 'lobby') {
                        document.getElementById("main-header").classList.remove("hidden");
                        if(roomData.gameState !== 'end' && document.getElementById("game-screen").style.display !== 'block') {
                            showScreen("game-screen");
                        }
                    }
                    render();
                    if(roomData.rematch.p1 && roomData.rematch.p2 && myRole === 'p1') createRoomData(roomData.p1.name, roomData.p2.name, 'board', false);
                }
            });
        }

        window.onbeforeunload = () => { if(myRoomId && myRole !== 'offline') db.collection("rooms").doc(myRoomId).update({[`${myRole}.left`]: true}); };
        document.getElementById("btn-exit").onclick = async () => {
            playSound('select');
            if(myRoomId && myRole !== 'offline') {
                try { await db.collection("rooms").doc(myRoomId).delete(); } catch(e) {}
            }
            location.reload(); 
        };

        function restartTimerAnim(sec) {
            const bar = document.getElementById("timer-bar");
            bar.style.animation = 'none';
            bar.offsetHeight;
            if(sec > 0) bar.style.animation = `shrinkTimer ${sec}s linear forwards`;
        }

            if(idleTimer) { clearTimeout(idleTimer); idleTimer = null; }
        }

        function render() {

            if (d.wildBlink && !lastBlinkState) {

            }

            p2Box.className = "player-score" + (d.activePlayer === 'p2' && d.wildBlink ? " p2-active-wild" : (d.turn === 'p2' ? " has-turn" : ""));

                if (!boardRendered) { initBoard(); boardRendered = true; }

                document.getElementById("modal").style.display = "none";
                document.getElementById("end-modal").style.display = "none";
            } else if (d.gameState === 'speed_q' || d.gameState === 'question') {
                document.getElementById("modal").style.display = "flex";
                document.getElementById("end-modal").style.display = "none";
                const q = d.speedQMode ? d.currentQ : d.board[d.currentQ.col].questions[d.currentQ.row];
                document.getElementById("question-text").innerText = q.q;

                const optSec = document.getElementById("options-section");
                optSec.innerHTML = "";

                    const b = document.createElement("button"); b.className = "option-btn"; b.innerText = opt;
                    if(d.wrongAnswers.includes(opt)) b.classList.add("btn-wrong");
                    if(d.phase === 'strobe' && d.selectedOption === opt) b.classList.add("btn-strobe");
                    if(d.phase === 'result') {
                        if(opt === q.correct) b.classList.add("btn-correct-final");
                        else if(d.selectedOption === opt) b.classList.add("btn-wrong");
                        if(opt === q.correct && d.selectedOption !== q.correct) b.classList.add("btn-correct-blink");
                    }
                    b.onclick = () => handleSelect(opt);
                    optSec.appendChild(b);
                });

                const buzzerHint = document.getElementById("buzzer-hint");

                if (d.phase === 'idle') {
                    if (lastQuestionId !== q.q) {
                        localIdleStartTime = Date.now();
                        lastQuestionId = q.q;
                    }

                    document.getElementById("status-message").innerText = d.speedQMode ? "GYORSASÁGI KÖR!" : (d.stealMode ? "RABLÁS! KI TUDJA?" : "KÉSZÜLJ...");
                    document.getElementById("lexikon-magyarazat").style.display = "none";
                    
                    buzzerHint.style.display = (myRole === 'offline' || !(d.stealMode && d.lastWrongPlayer === myRole)) ? "block" : "none";
                    
                    if(myRole === 'offline') {
                        updateRoom({activePlayer:'p1', phase:'answering', buzzTime: 1.5});
                    } else {
                        restartTimerAnim(7);
                        if (!idleTimer && myRole === 'p1') {
                            idleTimer = setTimeout(() => {
                                if(roomData.phase === 'idle') {
                                    playSound('wrong'); 
                                    let nextTurn = roomData.turn || 'p1';
                                    updateRoom({ phase: 'result', activePlayer: 'none', turn: nextTurn });
                                }
                            }, 7000);

                    }
                } else if (d.phase === 'answering') {
                    clearTimers();
                    buzzerHint.style.display = "none";
                    const isMe = (d.activePlayer === myRole || myRole === 'offline');
                    
                    let timeText = d.buzzTime ? `<span class="reaction-info">(Megnyomta: ${d.buzzTime.toFixed(2)} mp alatt)</span>` : "";
                    let speedBonusInfo = (d.buzzTime && d.buzzTime <= 2.0 && !d.speedQMode) ? `<span class="speed-bonus-text">⚡ GYORSASÁGI BÓNUSZ AKTÍV! (+1000 Ft)</span>` : "";
                    
                    document.getElementById("status-message").innerHTML = d[d.activePlayer].name + " válaszol! " + timeText + speedBonusInfo;
                    
                    const limit = d.speedQMode ? 8 : ({ 1000: 20, 2000: 16, 3000: 12, 4000: 10, 5000: 10 }[q.points] || 8);
                    
                    restartTimerAnim(limit);
                   if (myRole === 'offline') {
    // Gyakorló módban nincs időzítő és eltüntetjük a zöld csíkot

} else {

    restartTimerAnim(limit);

        localTimer = setTimeout(() => handleSelect(null), limit * 1000);

}
                } else if (d.phase === 'result') {

                    if((myRole === 'p1' || myRole === 'offline') && !idleTimer) {

            }

        async function processEndGameLeaderboard(d) {
